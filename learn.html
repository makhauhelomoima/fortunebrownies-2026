<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Fortune University 🎓</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      background: #000;
      font-family: -apple-system, sans-serif;
      color: #fff;
      min-height: 100vh;
    }
    body {
      background: radial-gradient(ellipse at top, #1a1a1a 0%, #000 70%);
      padding: 16px;
    }
   .header {
      background: linear-gradient(145deg, rgba(26,15,8,0.9) 0%, rgba(45,24,16,0.9) 100%);
      backdrop-filter: blur(20px);
      padding: 24px;
      border-radius: 24px;
      border: 2px solid rgba(255, 215, 0, 0.4);
      box-shadow: 0 8px 40px rgba(255, 215, 0, 0.15);
      margin-bottom: 24px;
      text-align: center;
    }
    h1 {
      color: #FFD700;
      font-size: 2rem;
      margin-bottom: 8px;
      font-weight: 900;
      text-shadow: 0 0 30px rgba(255, 215, 0, 0.5);
    }
   .subtitle {
      opacity: 0.9;
      font-size: 1rem;
      letter-spacing: 0.5px;
    }
   .access-card {
      background: linear-gradient(145deg, rgba(255,215,0,0.15) 0%, rgba(255,215,0,0.05) 100%);
      border: 2px solid #FFD700;
      padding: 20px;
      border-radius: 20px;
      margin-bottom: 24px;
      text-align: center;
    }
   .access-card h2 { color: #FFD700; margin-bottom: 8px; }
    input {
      width: 100%;
      padding: 16px;
      border-radius: 14px;
      border: 2px solid rgba(255, 215, 0, 0.3);
      background: rgba(0,0,0,0.4);
      color: #fff;
      font-size: 1rem;
      margin: 12px 0;
    }
    input::placeholder { color: rgba(255,255,255,0.5); }
    button {
      background: linear-gradient(145deg, #FFD700 0%, #E6C200 100%);
      color: #000;
      border: none;
      padding: 18px 20px;
      border-radius: 16px;
      font-weight: 900;
      font-size: 1.1rem;
      cursor: pointer;
      width: 100%;
      box-shadow: 0 4px 20px rgba(255, 215, 0, 0.3);
      transition: all 0.15s;
    }
    button:active { transform: scale(0.96); }
   .module {
      background: linear-gradient(145deg, rgba(26,15,8,0.8) 0%, rgba(45,24,16,0.8) 100%);
      backdrop-filter: blur(10px);
      padding: 20px;
      border-radius: 20px;
      border: 1px solid rgba(255, 215, 0, 0.2);
      margin-bottom: 16px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    }
   .module-title {
      font-size: 1.2rem;
      font-weight: 800;
      color: #FFD700;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
   .module-desc {
      opacity: 0.9;
      margin-bottom: 16px;
      line-height: 1.5;
    }
   .resource-link {
      display: block;
      background: rgba(255, 215, 0, 0.1);
      border: 1px solid rgba(255, 215, 0, 0.3);
      padding: 14px 16px;
      border-radius: 12px;
      color: #FFD700;
      text-decoration: none;
      font-weight: 700;
      margin-bottom: 8px;
      transition: all 0.15s;
    }
   .resource-link:active {
      background: rgba(255, 215, 0, 0.2);
      transform: scale(0.98);
    }
   .hidden { display: none; }
   .wins-section {
      background: rgba(255, 215, 0, 0.1);
      border: 2px dashed rgba(255, 215, 0, 0.4);
      padding: 20px;
      border-radius: 20px;
      margin-top: 24px;
      text-align: center;
    }
   .win-card {
      background: rgba(0,0,0,0.3);
      padding: 16px;
      border-radius: 14px;
      margin: 12px 0;
      text-align: left;
      border-left: 3px solid #FFD700;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>🎓 Fortune University 💛</h1>
    <p class="subtitle">Keep the brand intact. Own your town. 🧡</p>
  </div>

  <div id="loginSection" class="access-card">
    <h2>🔐 Franchisee Access</h2>
    <p style="opacity: 0.9; margin-bottom: 12px;">Enter your email to unlock training</p>
    <input type="email" id="emailInput" placeholder="Email you used to buy kit">
    <button onclick="checkAccess()">🚀 Enter Classroom</button>
    <p style="font-size: 0.8rem; opacity: 0.7; margin-top: 12px;">
      Haven't bought yet? <a href="/" style="color: #FFD700;">Get Franchise Kit M250</a>
    </p>
  </div>

  <div id="classroomSection" class="hidden">
    <div id="modulesContainer"></div>

    <div class="wins-section">
      <h3 style="color: #FFD700; margin-bottom: 12px;">🏆 Share Your Win</h3>
      <p style="opacity: 0.9; margin-bottom: 16px;">Sold your first tray? Hit M1000? Post it here!</p>
      <button onclick="submitWin()">📸 Submit Win + Review</button>
      <div id="winsContainer" style="margin-top: 16px;"></div>
    </div>

    <div style="margin-top: 24px; text-align: center;">
      <a href="https://wa.me/26657031600" style="color: #FFD700; text-decoration: none; font-weight: 700;">
        💬 Need Support? WhatsApp Makhauhelo
      </a>
    </div>
  </div>

  <script>
    const SUPABASE_URL = 'https://rjbiiqamdgvibazpmmzx.supabase.co/rest/v1';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJqYmlpcWFtZGd2aWJhenBtbXp4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTQyNTU5NDcsImV4cCI6MjA2OTgzMTk0N30.T8HYkA2C4wMJW21DDIOZcMSWUkHuwX9gZV4FPoAOuRA';

    async function checkAccess() {
      const email = document.getElementById('emailInput').value.trim();
      if (!email) return alert('Enter your email 🧡');

      try {
        const res = await fetch(SUPABASE_URL + `/leads?email=eq.${encodeURIComponent(email)}&select=email`, {
          headers: { 'apikey': SUPABASE_KEY }
        });
        const data = await res.json();

        if (data.length > 0) {
          document.getElementById('loginSection').classList.add('hidden');
          document.getElementById('classroomSection').classList.remove('hidden');
          localStorage.setItem('fb_email', email);
          loadModules();
          loadWins();
        } else {
          alert('Email not found 😭\n\nBuy Franchise Kit first to access training 💛');
        }
      } catch (err) {
        alert('Error checking access. Try again.');
      }
    }

    async function loadModules() {
      try {
        const res = await fetch(SUPABASE_URL + '/resources?active=eq.true&order=module_number', {
          headers: { 'apikey': SUPABASE_KEY }
        });
        const resources = await res.json();

        const modules = {};
        resources.forEach(r => {
          if (!modules[r.module_number]) modules[r.module_number] = [];
          modules[r.module_number].push(r);
        });

        const container = document.getElementById('modulesContainer');
        container.innerHTML = Object.keys(modules).sort().map(num => {
          const mods = modules[num];
          const first = mods[0];
          return `
            <div class="module">
              <div class="module-title">🍫 Module ${num}: ${first.title.split(':')[0] || 'Training'}</div>
              <div class="module-desc">${first.description || 'Keep the brand intact.'}</div>
              ${mods.map(r => `
                <a href="${r.resource_url}" target="_blank" class="resource-link">
                  ${r.emoji} ${r.title}
                </a>
              `).join('')}
            </div>
          `;
        }).join('');
      } catch (err) {
        console.error(err);
      }
    }

    async function loadWins() {
      try {
        const res = await fetch(SUPABASE_URL + '/wins?approved=eq.true&order=created_at.desc&limit=5', {
          headers: { 'apikey': SUPABASE_KEY }
        });
        const wins = await res.json();

        document.getElementById('winsContainer').innerHTML = wins.map(w => `
          <div class="win-card">
            <strong style="color: #FFD700;">${w.email.split('@')[0]}</strong>
            <p style="margin-top: 8px; opacity: 0.9;">${w.win_text}</p>
          </div>
        `).join('');
      } catch (err) {
        console.error(err);
      }
    }

    async function submitWin() {
      const win = prompt('What did you achieve? 🎉\n\nExample: "Sold first 3 trays in 2 hours!"');
      if (!win) return;

      const email = localStorage.getItem('fb_email');

      try {
        await fetch(SUPABASE_URL + '/wins', {
          method: 'POST',
          headers: {
            'apikey': SUPABASE_KEY,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            email: email,
            win_text: win,
            approved: false
          })
        });
        alert(`Win submitted! 🧡\n\nMakhauhelo will approve it soon.`);
        loadWins();
      } catch (err) {
        alert('Error submitting win');
      }
    }

    // Auto-login if email saved
    if (localStorage.getItem('fb_email')) {
      document.getElementById('emailInput').value = localStorage.getItem('fb_email');
      checkAccess();
    }
  </script>
</body>
                                                                                       </html>
