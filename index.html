<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      height: 100%;
      background: #000;
      overflow: hidden;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle at 50% 30%, #1a1a1a 0%, #000 70%);
    }
  .container {
      width: 100%;
      max-width: 100%;
      height: 100%;
      padding: 16px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
  .card {
      background: linear-gradient(145deg, #1a0f08 0%, #2d1810 100%);
      padding: 48px 24px 40px;
      border-radius: 28px;
      border: 3px solid #FFD700;
      box-shadow: 0 0 60px rgba(255, 215, 0, 0.25), 0 12px 40px rgba(0,0,0,0.9);
      width: 100%;
    }
    h1 {
      font-size: 2.2rem;
      margin-bottom: 16px;
      line-height: 1.1;
      font-weight: 900;
      color: #FFD700;
    }
  .tagline {
      font-size: 1.1rem;
      opacity: 0.95;
      margin-bottom: 36px;
      line-height: 1.4;
    }
  .price {
      font-size: 4rem;
      font-weight: 900;
      margin: 28px 0 36px;
      color: #FFD700;
      letter-spacing: -3px;
      text-shadow: 0 0 30px rgba(255, 215, 0, 0.6);
    }
    button {
      background: linear-gradient(145deg, #FFD700 0%, #E6C200 100%);
      color: #000;
      border: none;
      padding: 22px 20px;
      font-size: 1.2rem;
      font-weight: 900;
      border-radius: 18px;
      cursor: pointer;
      width: 100%;
      transition: all 0.15s;
      box-shadow: 0 6px 24px rgba(255, 215, 0, 0.4);
      margin-bottom: 12px;
    }
    button:active {
      transform: scale(0.95);
      box-shadow: 0 3px 12px rgba(255, 215, 0, 0.3);
    }
    button:disabled {
      opacity: 0.7;
      transform: scale(1);
    }
  .contact {
      margin-top: 16px;
      font-size: 1rem;
      opacity: 0.95;
      letter-spacing: 0.5px;
    }
  .contact a {
      color: #FFD700;
      text-decoration: none;
      font-weight: 700;
    }
  .payment-methods {
      font-size: 0.85rem;
      opacity: 0.8;
      margin-top: 8px;
    }
  .links {
      margin-top: 24px;
      display: flex;
      gap: 16px;
      justify-content: center;
      font-size: 0.9rem;
    }
  .links a {
      color: #FFD700;
      text-decoration: none;
      font-weight: 700;
    }
  </style>
</head>
