<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Fortune Brownies ©2026</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #8B4513 0%, #D2691E 100%);
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 20px;
    }
    .container {
      max-width: 400px;
      background: rgba(0,0,0,0.3);
      padding: 40px 30px;
      border-radius: 20px;
      backdrop-filter: blur(10px);
    }
    h1 { font-size: 2.5rem; margin-bottom: 10px; }
    .tagline { font-size: 1.1rem; opacity: 0.9; margin-bottom: 30px; }
    .price { 
      font-size: 3rem; 
      font-weight: bold; 
      margin: 20px 0;
      color: #FFD700;
    }
    button {
      background: #FFD700;
      color: #8B4513;
      border: none;
      padding: 18px 40px;
      font-size: 1.2rem;
      font-weight: bold;
      border-radius: 50px;
      cursor: pointer;
      width: 100%;
      transition: transform 0.2s;
    }
    button:hover { transform: scale(1.05); }
    button:active { transform: scale(0.98); }
    .contact { margin-top: 20px; font-size: 0.9rem; opacity: 0.8; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🍫 The Fortune Brownies ©2026</h1>
    <p class="tagline">Own your town. One tray at a time.</p>
    
    <div class="price">M250</div>
    
    <button onclick="buyKit()">
      Buy Franchise Kit - Mpesa M250
    </button>
    
    <p class="contact">WhatsApp: +26657031600</p>
  </div>

  <script>
    async function buyKit() {
      const email = prompt('Enter your email:');
      const phone = prompt('Enter your Mpesa number: +266');
      
      if (!email || !phone) {
        alert('Please enter both email and phone');
        return;
      }
      
      const btn = document.querySelector('button');
      btn.innerHTML = 'Processing...';
      btn.disabled = true;
      
      try {
        const res = await fetch('https://rjbiiqamdgvibazpmmzx.supabase.co/rest/v1/leads', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'apikey': 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJqYmlpcWFtZGd2aWJhenBtbXp4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTQyNTU5NDcsImV4cCI6MjA2OTgzMTk0N30.T8HYkA2C4wMJW21DDIOZcMSWUkHuwX9gZV4FPoAOuRA'
          },
          body: JSON.stringify({
            email: email,
            phone: phone,
            amount: 250,
            currency: 'M',
            status: 'pending_mpesa'
          })
        });
        
        if (res.ok) {
          alert('Order received! We will WhatsApp you Mpesa details for M250. Check your email.');
          btn.innerHTML = 'Order Received ✅';
        } else {
          throw new Error('Failed');
        }
      } catch (err) {
        alert('Error. Please WhatsApp +26657031600 to order directly.');
        btn.innerHTML = 'Buy Franchise Kit - Mpesa M250';
        btn.disabled = false;
      }
    }
  </script>
</body>
</html>
