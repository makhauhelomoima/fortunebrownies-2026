<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fortune Brownies HQ 💛</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      background: #000;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: #fff;
      min-height: 100vh;
    }
    body {
      background: radial-gradient(ellipse at top, #1a1a1a 0%, #000 70%);
      padding: 16px;
    }
    .header {
      background: linear-gradient(145deg, rgba(26,15,8,0.9) 0%, rgba(45,24,16,0.9) 100%);
      backdrop-filter: blur(20px);
      padding: 24px;
      border-radius: 24px;
      border: 2px solid rgba(255, 215, 0, 0.4);
      box-shadow: 0 8px 40px rgba(255, 215, 0, 0.15);
      margin-bottom: 24px;
      text-align: center;
    }
    h1 { 
      color: #FFD700; 
      font-size: 2rem; 
      margin-bottom: 8px;
      font-weight: 900;
      text-shadow: 0 0 30px rgba(255, 215, 0, 0.5);
    }
    .subtitle {
      opacity: 0.9;
      font-size: 1rem;
      letter-spacing: 0.5px;
    }
    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      margin: 24px 0;
    }
    .stat-card {
      background: linear-gradient(145deg, rgba(26,15,8,0.8) 0%, rgba(45,24,16,0.8) 100%);
      backdrop-filter: blur(10px);
      padding: 20px 16px;
      border-radius: 20px;
      border: 1px solid rgba(255, 215, 0, 0.2);
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
      text-align: center;
      transition: transform 0.2s;
    }
    .stat-card:active { transform: scale(0.97); }
    .stat-emoji { font-size: 1.8rem; margin-bottom: 8px; }
    .stat-number { 
      font-size: 2.2rem; 
      color: #FFD700; 
      font-weight: 900;
      letter-spacing: -1px;
    }
    .stat-label { 
      font-size: 0.85rem; 
      opacity: 0.8;
      margin-top: 4px;
      font-weight: 600;
    }
    .section-title {
      font-size: 1.3rem;
      font-weight: 800;
      color: #FFD700;
      margin: 32px 0 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .table-wrap {
      background: rgba(26,15,8,0.6);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      border: 1px solid rgba(255, 215, 0, 0.2);
      overflow: hidden;
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    }
    table {
      width: 100%;
      font-size: 0.9rem;
    }
    th, td { 
      padding: 14px 12px; 
      text-align: left; 
      border-bottom: 1px solid rgba(255, 215, 0, 0.1);
    }
    th { 
      background: rgba(45,24,16,0.9); 
      color: #FFD700;
      font-weight: 800;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    tr:last-child td { border-bottom: none; }
    .status { 
      padding: 6px 10px; 
      border-radius: 10px; 
      font-size: 0.75rem;
      font-weight: 800;
      display: inline-block;
    }
    .pending_mpesa { 
      background: linear-gradient(145deg, #1e40af, #1e3a8a);
      box-shadow: 0 2px 8px rgba(30, 64, 175, 0.4);
    }
    .pending_eft { 
      background: linear-gradient(145deg, #7c2d12, #92400e);
      box-shadow: 0 2px 8px rgba(124, 45, 18, 0.4);
    }
    .btn-group {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 20px;
    }
    button {
      background: linear-gradient(145deg, #FFD700 0%, #E6C200 100%);
      color: #000;
      border: none;
      padding: 16px 20px;
      border-radius: 16px;
      font-weight: 800;
      font-size: 1rem;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(255, 215, 0, 0.3);
      transition: all 0.15s;
    }
    button:active { 
      transform: scale(0.96);
      box-shadow: 0 2px 10px rgba(255, 215, 0, 0.2);
    }
    .btn-secondary {
      background: rgba(255, 215, 0, 0.15);
      color: #FFD700;
      border: 2px solid rgba(255, 215, 0, 0.4);
    }
    .empty {
      text-align: center;
      padding: 40px 20px;
      opacity: 0.6;
    }
  </style>
</head>
<body>

    <h1>🍫 Fortune Brownies HQ 💛</h1>
    <p class="subtitle">Makhauhelo Moima | Bonhomme, Maseru 🧡</p>
  </div>
