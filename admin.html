<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fortune Brownies HQ 💛</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      background: #000;
      font-family: -apple-system, sans-serif;
      color: #fff;
      min-height: 100vh;
    }
    body {
      background: radial-gradient(ellipse at top, #1a1a1a 0%, #000 70%);
      padding: 16px;
    }
   .header {
      background: linear-gradient(145deg, rgba(26,15,8,0.9) 0%, rgba(45,24,16,0.9) 100%);
      backdrop-filter: blur(20px);
      padding: 24px;
      border-radius: 24px;
      border: 2px solid rgba(255, 215, 0, 0.4);
      box-shadow: 0 8px 40px rgba(255, 215, 0, 0.15);
      margin-bottom: 24px;
      text-align: center;
    }
    h1 {
      color: #FFD700;
      font-size: 2rem;
      margin-bottom: 8px;
      font-weight: 900;
      text-shadow: 0 0 30px rgba(255, 215, 0, 0.5);
    }
   .subtitle {
      opacity: 0.9;
      font-size: 1rem;
      letter-spacing: 0.5px;
    }
   .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      margin: 24px 0;
    }
   .stat-card {
      background: linear-gradient(145deg, rgba(26,15,8,0.8) 0%, rgba(45,24,16,0.8) 100%);
      backdrop-filter: blur(10px);
      padding: 20px 16px;
      border-radius: 20px;
      border: 1px solid rgba(255, 215, 0, 0.2);
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
      text-align: center;
      transition: transform 0.2s;
    }
   .stat-card:active { transform: scale(0.97); }
   .stat-emoji { font-size: 1.8rem; margin-bottom: 8px; }
   .stat-number {
      font-size: 2.2rem;
      color: #FFD700;
      font-weight: 900;
      letter-spacing: -1px;
    }
   .stat-label {
      font-size: 0.85rem;
      opacity: 0.8;
      margin-top: 4px;
      font-weight: 600;
    }
   .section-title {
      font-size: 1.3rem;
      font-weight: 800;
      color: #FFD700;
      margin: 32px 0 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
   .table-wrap {
      background: rgba(26,15,8,0.6);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      border: 1px solid rgba(255, 215, 0, 0.2);
      overflow-x: auto;
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    }
    table {
      width: 100%;
      font-size: 0.85rem;
      min-width: 600px;
    }
    th, td {
      padding: 14px 12px;
      text-align: left;
      border-bottom: 1px solid rgba(255, 215, 0, 0.1);
    }
    th {
      background: rgba(45,24,16,0.9);
      color: #FFD700;
      font-weight: 800;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    tr:last-child td { border-bottom: none; }
   .status {
      padding: 6px 10px;
      border-radius: 10px;
      font-size: 0.75rem;
      font-weight: 800;
      display: inline-block;
      cursor: pointer;
    }
   .pending_mpesa {
      background: linear-gradient(145deg, #1e40af, #1e3a8a);
      box-shadow: 0 2px 8px rgba(30, 64, 175, 0.4);
    }
   .pending_eft {
      background: linear-gradient(145deg, #7c2d12, #92400e);
      box-shadow: 0 2px 8px rgba(124, 45, 18, 0.4);
    }
   .paid {
      background: linear-gradient(145deg, #15803d, #166534);
      box-shadow: 0 2px 8px rgba(21, 128, 61, 0.4);
    }
   .btn-group {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 20px;
    }
    button {
      background: linear-gradient(145deg, #FFD700 0%, #E6C200 100%);
      color: #000;
      border: none;
      padding: 16px 20px;
      border-radius: 16px;
      font-weight: 800;
      font-size: 1rem;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(255, 215, 0, 0.3);
      transition: all 0.15s;
    }
    button:active {
      transform: scale(0.96);
      box-shadow: 0 2px 10px rgba(255, 215, 0, 0.2);
    }
   .btn-secondary {
      background: rgba(255, 215, 0, 0.15);
      color: #FFD700;
      border: 2px solid rgba(255, 215, 0, 0.4);
    }
   .empty {
      text-align: center;
      padding: 40px 20px;
      opacity: 0.6;
    }
   .action-btn {
      background: #FFD700;
      color: #000;
      border: none;
      padding: 6px 12px;
      border-radius: 8px;
      font-size: 0.75rem;
      font-weight: 800;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>🍫 Fortune Brownies HQ 💛</h1>
    <p class="subtitle">Makhauhelo Moima | Bonhomme, Maseru 🧡</p>
  </div>

  <div class="stats">
    <div class="stat-card">
      <div class="stat-emoji">📦</div>
      <div class="stat-number" id="totalOrders">0</div>
      <div class="stat-label">Total Orders</div>
    </div>
    <div class="stat-card">
      <div class="stat-emoji">💰</div>
      <div class="stat-number" id="totalRevenue">M0</div>
      <div class="stat-label">Revenue</div>
    </div>
    <div class="stat-card">
      <div class="stat-emoji">📱</div>
      <div class="stat-number" id="mpesaCount">0</div>
      <div class="stat-label">Mpesa</div>
    </div>
    <div class="stat-card">
      <div class="stat-emoji">🏦</div>
      <div class="stat-number" id="eftCount">0</div>
      <div class="stat-label">Post Bank EFT</div>
    </div>
  </div>

  <h2 class="section-title">✨ Recent Orders</h2>
  <div class="table-wrap">
    <table id="ordersTable">
      <thead>
        <tr>
          <th>Email</th>
          <th>Phone</th>
          <th>Method</th>
          <th>Status</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody id="ordersBody">
        <tr><td colspan="5" class="empty">Loading your empire... 🧡</td></tr>
      </tbody>
    </table>
  </div>

  <div class="btn-group">
    <button onclick="loadOrders()">🔄 Refresh</button>
    <button class="btn-secondary" onclick="exportEmails()">📧 Export Emails</button>
  </div>

  <button style="margin-top: 12px;" onclick="window.open('https://wa.me/26657031600','_blank')">
    💬 WhatsApp Support
  </button>

  <script>
    const SUPABASE_URL = 'https://rjbiiqamdgvibazpmmzx.supabase.co/rest/v1/leads';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJqYmlpcWFtZGd2aWJhenBtbXp4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTQyNTU5NDcsImV4cCI6MjA2OTgzMTk0N30.T8HYkA2C4wMJW21DDIOZcMSWUkHuwX9gZV4FPoAOuRA';

    async function loadOrders() {
      try {
        const res = await fetch(SUPABASE_URL + '?order=created_at.desc', {
          headers: {
            'apikey': SUPABASE_KEY,
            'Authorization': `Bearer ${SUPABASE_KEY}`
          }
        });
        const data = await res.json();

        const paidOrders = data.filter(d => d.status === 'paid');
        document.getElementById('totalOrders').textContent = data.length;
        document.getElementById('totalRevenue').textContent = 'M' + (paidOrders.length * 250);
        document.getElementById('mpesaCount').textContent = data.filter(d => d.payment_method === 'mpesa').length;
        document.getElementById('eftCount').textContent = data.filter(d => d.payment_method === 'postbank_eft').length;

        const tbody = document.getElementById('ordersBody');
        if (data.length === 0) {
          tbody.innerHTML = '<tr><td colspan="5" class="empty">No orders yet 🤍<br>Post your link!</td></tr>';
          return;
        }

        tbody.innerHTML = data.slice(0, 20).map(order => `
          <tr>
            <td>${order.email || '-'}</td>
            <td>${order.phone || '-'}</td>
            <td>${order.payment_method === 'mpesa'? '📱 Mpesa' : '🏦 EFT'}</td>
            <td><span class="status ${order.status}">${order.status.replace('_', ' ')}</span></td>
            <td>
              ${order.status!== 'paid'?
                `<button class="action-btn" onclick="markPaid(${order.id})">Mark Paid</button>` :
                '✅'
              }
            </td>
          </tr>
        `).join('');

      } catch (err) {
        document.getElementById('ordersBody').innerHTML = '<tr><td colspan="5" class="empty">Error loading 😭<br>Check connection</td></tr>';
      }
    }

    async function markPaid(id) {
      if (!confirm('Mark this order as PAID?\n\nOnly do this after you see M250 in Mpesa or Post Bank.')) return;

      try {
        await fetch(SUPABASE_URL + `?id=eq.${id}`, {
          method: 'PATCH',
          headers: {
            'apikey': SUPABASE_KEY,
            'Authorization': `Bearer ${SUPABASE_KEY}`,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            status: 'paid',
            paid_at: new Date().toISOString()
          })
        });
        loadOrders();
        alert('Marked as paid! 💰');
      } catch (err) {
        alert('Error updating order');
      }
    }

    function exportEmails() {
      fetch(SUPABASE_URL + '?select=email', {
        headers: { 'apikey': SUPABASE_KEY }
      })
     .then(r => r.json())
     .then(data => {
        const emails = data.map(d => d.email).filter(e => e).join('\n');
        navigator.clipboard.writeText(emails);
        alert(`💛 Copied ${data.length} emails!\n\nPaste into Gmail for updates 🧡`);
      });
    }

    loadOrders();
  </script>
</body>
  </html>
